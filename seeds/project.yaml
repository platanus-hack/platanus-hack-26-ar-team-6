# V1 project seed.
#
# A single project row is created for the demo. Project context entries are
# read by V3's target="project" flow; V1 just needs the rows to exist so V3
# can build on top.

project:
  name: "Cross-User Context Demo"
  description: |
    The hackathon demo project. Two users (frontend + deployment) share a
    single project; each prompt either resolves locally or escalates via
    request_context to the other user's on-demand agent.

context_entries:
  - content: |
      The project is built as three components: a shared remote server, a
      local app (per user) hosting the user's coding AI, and an on-demand
      agent the server spins up to answer cross-user queries grounded in
      a target user's stored context.
    metadata:
      tags: [architecture, overview]

  - content: |
      Users on this project: User1 owns the frontend / desktop app surface;
      User2 owns the server, deployment, and infra. Roster lookups for the
      AI's request_context tool route by these domains.
    metadata:
      tags: [roster, routing]

  - content: |
      Project-scoped questions should be routed to target="project" when they
      ask about shared architecture, the cross-user context workflow, or facts
      that belong to the whole demo rather than one teammate's private domain.
    metadata:
      tags: [project-target, routing, architecture]

scripted_prompts:
  - name: project_architecture_context_loop
    ask_from_user_key: user1
    prompt: |
      What are the shared architecture pieces in this project, and when should the AI use project context instead of asking User1 or User2?
    expected_target: project
    expected_answer_facts:
      - The project has a shared remote server.
      - Each user has a local app that hosts their coding AI.
      - The server can answer from project_context_entry for shared project facts.
      - User1 owns frontend / desktop app work.
      - User2 owns server, deployment, and infra work.
