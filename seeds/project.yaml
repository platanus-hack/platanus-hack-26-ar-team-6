# Project seed.
#
# A single project row is created for the demo. Project context entries are
# read by bootstrap and by the retriever through global_ctx.

project:
  name: "Cross-User Context Demo"
  description: |
    The hackathon demo project. Two users (frontend + deployment) share a
    single project; each prompt either resolves locally or asks the retriever
    for teammate or global context.

context_entries:
  - content: |
      The project is built as three components: a shared remote server, a
      local app (per user) hosting the user's coding AI, and a LangGraph
      multi-agent runtime with user, retriever, and updater nodes.
    metadata:
      tags: [architecture, overview]

  - content: |
      Users on this project: User1 owns the frontend / desktop app surface;
      User2 owns the server, deployment, and infra. Roster lookups for the
      AI's ask_retriever tool use these domains to choose agent_ctx targets.
    metadata:
      tags: [roster, retrieval]

  - content: |
      Project-scoped questions should use global_ctx when they ask about shared
      architecture, the multi-agent context workflow, or facts that belong to
      the whole demo rather than one teammate's private domain.
    metadata:
      tags: [global-context, retrieval, architecture]

scripted_prompts:
  - name: project_architecture_context_loop
    ask_from_user_key: user1
    prompt: |
      What are the shared architecture pieces in this project, and when should the AI use project context instead of asking User1 or User2?
    expected_target: project
    expected_answer_facts:
      - The project has a shared remote server.
      - Each user has a local app that hosts their coding AI and LangGraph runtime.
      - The retriever can call global_ctx for shared project facts.
      - User1 owns frontend / desktop app work.
      - User2 owns server, deployment, and infra work.
