services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: relevo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: relevo
      POSTGRES_PASSWORD: relevo
      POSTGRES_DB: relevo
    ports:
      - "5432:5432"
    volumes:
      - relevo_pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relevo -d relevo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  relevo_pgdata:
